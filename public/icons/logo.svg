<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="shield-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="inner-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1117;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a1d27;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="#0f1117"/>
  <circle cx="100" cy="100" r="92" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-opacity="0.3"/>

  <!-- Shield shape (Magen David inspired) -->
  <path d="M100 22 L160 60 L160 120 Q160 170 100 188 Q40 170 40 120 L40 60 Z"
        fill="url(#shield-grad)" filter="url(#glow)"/>

  <!-- Inner shield -->
  <path d="M100 34 L150 66 L150 118 Q150 160 100 176 Q50 160 50 118 L50 66 Z"
        fill="url(#inner-grad)"/>

  <!-- House silhouette (shelter/home) -->
  <g transform="translate(100,88)" fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Roof -->
    <path d="M-28 0 L0 -22 L28 0"/>
    <!-- Walls -->
    <rect x="-20" y="0" width="40" height="28" rx="2" fill="none"/>
    <!-- Door -->
    <rect x="-7" y="10" width="14" height="18" rx="1" fill="#22c55e" fill-opacity="0.2"/>
    <!-- Doorknob -->
    <circle cx="4" cy="20" r="1.5" fill="#22c55e"/>
  </g>

  <!-- Iron Swords symbol — crossed swords behind shield -->
  <g stroke="#60a5fa" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.6">
    <!-- Left sword -->
    <line x1="32" y1="38" x2="72" y2="78"/>
    <line x1="32" y1="38" x2="38" y2="42"/>
    <line x1="32" y1="38" x2="36" y2="34"/>
    <!-- Right sword -->
    <line x1="168" y1="38" x2="128" y2="78"/>
    <line x1="168" y1="38" x2="162" y2="42"/>
    <line x1="168" y1="38" x2="164" y2="34"/>
  </g>

  <!-- People dots (community) -->
  <g fill="#34d399" opacity="0.7">
    <circle cx="72" cy="148" r="3"/>
    <circle cx="84" cy="155" r="2.5"/>
    <circle cx="116" cy="155" r="2.5"/>
    <circle cx="128" cy="148" r="3"/>
    <circle cx="100" cy="158" r="2"/>
  </g>

  <!-- Signal waves (alert) -->
  <g fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.5">
    <path d="M100 48 Q106 44 100 40"/>
    <path d="M100 48 Q112 40 100 32"/>
  </g>
</svg>
